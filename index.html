<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metafly Mobile UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        
        <header class="hero-header">
            <div class="header-top">
                <div class="welcome-text">
                    Bienvenido Jean!
                    <!-- <span>Bienvenido a tus finanzas</span> -->
                </div>
                <div class="menu-btn-container">
                    <button class="menu-btn">☰</button>
                </div>
            </div>

            <div class="toggle-container">
                <div class="toggle-switch">
                    <div class="toggle-circle">$</div>
                    <span class="toggle-text">USD</span>
                    
                </div>
            </div>

            <div class="main-balance-box">
                <h1 class="amount-large">$1.100<span>,00</span></h1>
                <p class="balance-label">Balance Neto</p>
            </div>
        </header>

        <section class="floating-action-bar">
            <button class="capsule-btn">Bs 100.000<span>,00</span></button>
            <button id="btn-actualizar" class="capsule-btn btn-tasa">
                <!-- <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23 4L12 15.01L7 12M23 4C23 4 16.5 1 12 4C7.5 7 4 12 4 12C4 12 1.5 15 4 19C6.5 23 12 20 12 20S18.5 23 22 19C23 18 23 16 23 14C23 12 23 8 23 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg> -->
                Actualizar tasa
            </button>
        </section>

        <section class="quick-stats-row">
            <div class="stat-col">
                <div class="stat-card-mini">
                    <span>$1.200<span class="smaller">,00</span><div class="icon-circle"><img src="Material/Arrow-01.svg" alt=""></div></span>
                    
                </div>
            </div>
            <div class="center-btn-col">
                <button class="add-action-btn" id="open-modal-btn">+</button>
            </div>
            <div class="stat-col">
                <div class="stat-card-mini">
                    <span>$100<span class="smaller">,00</span><div class="icon-circle-down"><img src="Material/Arrow-01.svg" alt=""></div></span>
                </div>
            </div>
        </section>

        <main class="bottom-sheet">
            <div class="drag-handle"></div>

            <section class="dashboard-row">
                <div class="metas-container">
                    <h3 class="row-title">Tus Metas</h3>
                    <div class="metas-grid">
                        <div class="meta-item"><img src="assets/carro1.jpg" alt="Meta 1"></div>
                        <div class="meta-item"><img src="assets/carro2.jpg" alt="Meta 2"></div>
                        <div class="meta-item"><img src="assets/casa.jpg" alt="Meta 3"></div>
                        <div class="meta-item btn-add-meta"><span>+</span></div>
                    </div>
                </div>

                <div class="movimientos-container">
                    <h3 class="row-title">Tus Movimientos</h3>
                    <div class="grafico-card">
                        <div class="grafico-header">
                            <span class="grafico-time">Este mes</span>
                            <img class="icon-download" src="Material/Arrow-02.svg" alt="">
                        </div>
                        
                        <div class="grafico-wrapper">
                            <svg viewBox="0 0 300 120" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="gradient-area" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stop-color="#7646ff" stop-opacity="0.4"/>
                                        <stop offset="100%" stop-color="#7646ff" stop-opacity="0.0"/>
                                    </linearGradient>
                                </defs>
                                <path d="M 0,100 Q 40,50 80,75 T 160,60 T 240,40 T 300,20 L 300,120 L 0,120 Z" fill="url(#gradient-area)" />
                                <path d="M 0,100 Q 40,50 80,75 T 160,60 T 240,40 T 300,20" fill="none" stroke="#7646ff" stroke-width="3" stroke-linecap="round" />
                            </svg>
                        </div>

                        <div class="grafico-footer">
                            <h2 class="movimiento-total">$1.200,00</h2>
                            <div class="badge-tendencia">
                                <span class="arrow-up"><img class="icon-arrow" src="Material/Arrow-03.svg" alt=""></span> +2.10%
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <h2 class="sheet-title">Transacciones</h2>
            
            <div class="transaction-list">
                <div class="transaction-card">
                    <div class="t-col t-col-icon">
                        <div class="round-icon">
                            <img class="icon-category" src="Material/categories/work.svg" alt="work">
                        </div>
                    </div>
                    <div class="t-col t-details">
                        <span class="t-name">Trabajo</span>
                        <span class="t-date">01 Dic, 03:22 PM</span>
                    </div>
                    <div class="t-col t-col-amount income-color">
                        +$100.00
                    </div>
                </div>

                <div class="transaction-card">
                    <div class="t-col t-col-icon">
                        <div class="round-icon">
                            <img class="icon-category" src="Material/categories/market.svg" alt="market">
                        </div>
                    </div>
                    <div class="t-col t-details">
                        <span class="t-name">Compras</span>
                        <span class="t-date">01 Dic, 03:22 PM</span>
                    </div>
                    <div class="t-col t-col-amount expense-color">
                        -$50.00
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <h3>Nueva Transacción</h3>
            <form id="transaction-form">
                <div class="input-group">
                    <label>Monto ($)</label>
                    <input type="number" step="0.01" id="form-monto" required placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>Categoría</label>
                    <select id="form-categoria">
                        <option value="Trabajo">💼 Trabajo</option>
                        <option value="Comida">🛒 Comida</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-form secondary" id="close-modal-btn">Cancelar</button>
                    <button type="submit" class="btn-form primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('open-modal-btn');
        const closeBtn = document.getElementById('close-modal-btn');
        const modal = document.getElementById('entry-modal');

        openBtn.onclick = () => modal.style.display = 'flex';
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if(e.target == modal) modal.style.display = 'none'; }
    </script>
</body>
</html>
